<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#080c10"/>
<meta name="description" content="Macor Proveedores — Gestión profesional"/>
<link rel="manifest" href="manifest.json"/>
<title>Macor · Proveedores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:#080c10;
  --bg2:#0d1219;
  --bg3:#121820;
  --surface:#161d27;
  --surface2:#1c2535;
  --surface3:#22303f;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --text:#f0f4f8;
  --text2:#8fa3b8;
  --text3:#4a6070;
  --gold:#e8a020;
  --gold2:#f5c855;
  --gold-dim:rgba(232,160,32,0.15);
  --green:#22c97a;
  --green-dim:rgba(34,201,122,0.12);
  --red:#f05050;
  --red-dim:rgba(240,80,80,0.12);
  --amber:#f0a030;
  --amber-dim:rgba(240,160,48,0.12);
  --blue:#4a90d9;
  --blue-dim:rgba(74,144,217,0.12);
  --r:12px;--r2:8px;--r3:6px;
  --font:"Outfit",sans-serif;
  --mono:"JetBrains Mono",monospace;
  --transition:0.18s cubic-bezier(0.4,0,0.2,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-size:14px;line-height:1.5;}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}

/* GRAIN OVERLAY */
body::before{content:"";position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:999;opacity:0.4;}

/* CONFIG SCREEN */
.config-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;}
.config-screen::after{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 0%, rgba(232,160,32,0.06) 0%, transparent 70%);pointer-events:none;}
.config-box{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:2.5rem;max-width:440px;width:100%;position:relative;z-index:1;}
.config-box::before{content:"";position:absolute;inset:0;border-radius:20px;background:linear-gradient(135deg,rgba(232,160,32,0.04) 0%,transparent 60%);pointer-events:none;}

/* LAYOUT */
.app{display:flex;flex-direction:column;min-height:100vh;}

/* TOPBAR */
.topbar{height:58px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.5rem;gap:1.25rem;position:sticky;top:0;z-index:100;background:rgba(8,12,16,0.92);backdrop-filter:blur(20px);}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;}
.brand-mark{width:32px;height:32px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#080c10;flex-shrink:0;letter-spacing:-0.5px;}
.brand-name{font-weight:700;font-size:0.95rem;color:var(--text);letter-spacing:-0.3px;}
.brand-sep{color:var(--text3);font-size:0.85rem;}
.brand-sub{color:var(--text2);font-size:0.85rem;font-weight:400;}
.topbar-gap{flex:1;}
.sync-badge{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:var(--surface);border:1px solid var(--border);font-size:0.72rem;color:var(--text2);}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:background var(--transition);}
.sync-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green);}
.sync-dot.err{background:var(--red);}
.sync-dot.demo{background:var(--gold);}

/* NAV TABS */
.nav{display:flex;align-items:center;gap:2px;padding:0 1.5rem;border-bottom:1px solid var(--border);background:var(--bg2);overflow-x:auto;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nav-tab{display:flex;align-items:center;gap:7px;padding:0 1rem;height:44px;font-size:0.82rem;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all var(--transition);flex-shrink:0;}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.nav-tab svg{width:15px;height:15px;opacity:0.7;}
.nav-tab.active svg{opacity:1;}
.nav-count{background:var(--gold-dim);color:var(--gold);font-size:0.68rem;font-weight:700;padding:1px 6px;border-radius:10px;}

/* CONTENT */
.content{flex:1;padding:1.75rem;max-width:1320px;width:100%;margin:0 auto;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:0 1rem;height:36px;border-radius:var(--r3);font-size:0.82rem;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all var(--transition);font-family:var(--font);white-space:nowrap;}
.btn-gold{background:var(--gold);color:#080c10;font-weight:700;}
.btn-gold:hover{background:var(--gold2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(232,160,32,0.3);}
.btn-ghost{background:transparent;color:var(--text2);border-color:var(--border2);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-danger{background:var(--red-dim);color:var(--red);border-color:rgba(240,80,80,0.25);}
.btn-danger:hover{background:rgba(240,80,80,0.2);}
.btn-surface{background:var(--surface2);color:var(--text);border-color:var(--border);}
.btn-surface:hover{background:var(--surface3);}
.btn-sm{height:30px;padding:0 0.75rem;font-size:0.78rem;}
.btn-xs{height:26px;padding:0 0.6rem;font-size:0.72rem;}
.btn-icon{width:36px;height:36px;padding:0;justify-content:center;border-radius:var(--r3);}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);position:relative;overflow:hidden;}
.card-pad{padding:1.25rem;}
.card-glow{position:absolute;inset:0;border-radius:var(--r);pointer-events:none;opacity:0;transition:opacity 0.3s;}
.card:hover .card-glow{opacity:1;}

/* KPI STRIP */
.kpi-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;background:var(--border);border-radius:var(--r);overflow:hidden;border:1px solid var(--border);margin-bottom:1.5rem;}
.kpi{background:var(--surface);padding:1.1rem 1.25rem;}
.kpi-label{font-size:0.7rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:0.5rem;}
.kpi-val{font-size:1.6rem;font-weight:800;color:var(--text);line-height:1;letter-spacing:-0.5px;}
.kpi-val.gold{color:var(--gold);}
.kpi-val.green{color:var(--green);}
.kpi-val.red{color:var(--red);}
.kpi-sub{font-size:0.72rem;color:var(--text3);margin-top:4px;}

/* SEARCH BAR */
.search-bar{position:relative;flex:1;min-width:0;}
.search-bar input{width:100%;height:40px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:0 1rem 0 2.75rem;font-size:0.85rem;color:var(--text);font-family:var(--font);outline:none;transition:border-color var(--transition);}
.search-bar input::placeholder{color:var(--text3);}
.search-bar input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim);}
.search-icon{position:absolute;left:0.875rem;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}

/* SELECT */
select{height:40px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:0 0.875rem;font-size:0.82rem;color:var(--text);font-family:var(--font);outline:none;cursor:pointer;transition:border-color var(--transition);}
select:focus{border-color:var(--gold);}

/* PROVEEDOR GRID */
.prov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1rem;}
.prov-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;cursor:pointer;transition:all var(--transition);position:relative;overflow:hidden;}
.prov-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0;transition:opacity var(--transition);}
.prov-card:hover{border-color:var(--border2);background:var(--surface2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3);}
.prov-card:hover::before{opacity:1;}
.prov-card.rank-1{border-color:rgba(232,160,32,0.4);}
.prov-card.rank-1::before{opacity:0.6;}

.prov-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem;}
.prov-name{font-size:0.95rem;font-weight:700;color:var(--text);line-height:1.3;}
.prov-cat{font-size:0.72rem;color:var(--text3);margin-top:3px;}
.prov-score-ring{width:46px;height:46px;flex-shrink:0;position:relative;}
.prov-score-ring svg{width:46px;height:46px;transform:rotate(-90deg);}
.prov-score-ring .track{fill:none;stroke:var(--surface3);stroke-width:4;}
.prov-score-ring .fill{fill:none;stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset 0.6s ease;}
.score-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:0.78rem;font-weight:800;font-family:var(--mono);}

.prov-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:1rem;}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:0.72rem;font-weight:500;}
.pill-green{background:var(--green-dim);color:var(--green);}
.pill-amber{background:var(--amber-dim);color:var(--amber);}
.pill-red{background:var(--red-dim);color:var(--red);}
.pill-blue{background:var(--blue-dim);color:var(--blue);}
.pill-gold{background:var(--gold-dim);color:var(--gold);}
.pill-surface{background:var(--surface3);color:var(--text2);}

.prov-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:0.5rem;}
.metric{background:var(--bg3);border-radius:6px;padding:0.5rem 0.625rem;}
.metric-label{font-size:0.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;}
.metric-val{font-size:0.88rem;font-weight:700;color:var(--text);}
.metric-val.good{color:var(--green);}
.metric-val.warn{color:var(--amber);}
.metric-val.bad{color:var(--red);}

.prov-footer{display:flex;align-items:center;justify-content:space-between;margin-top:1rem;padding-top:0.875rem;border-top:1px solid var(--border);}
.prov-contact{font-size:0.75rem;color:var(--text3);}

/* TABLE VIEW */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:0.82rem;}
thead th{padding:0.6rem 0.875rem;text-align:left;font-size:0.68rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;border-bottom:1px solid var(--border);background:var(--bg2);white-space:nowrap;cursor:pointer;user-select:none;}
thead th:hover{color:var(--text2);}
thead th.sorted{color:var(--gold);}
tbody tr{border-bottom:1px solid var(--border);transition:background var(--transition);cursor:pointer;}
tbody tr:hover{background:var(--surface2);}
tbody tr:last-child{border-bottom:none;}
tbody td{padding:0.75rem 0.875rem;color:var(--text);vertical-align:middle;}
.sort-arrow{margin-left:4px;opacity:0.5;}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:0.7rem;font-weight:600;letter-spacing:0.2px;}
.badge-green{background:var(--green-dim);color:var(--green);}
.badge-amber{background:var(--amber-dim);color:var(--amber);}
.badge-red{background:var(--red-dim);color:var(--red);}
.badge-blue{background:var(--blue-dim);color:var(--blue);}
.badge-gold{background:var(--gold-dim);color:var(--gold);}
.badge-surface{background:var(--surface3);color:var(--text2);}

/* SCORE BAR */
.score-bar{display:flex;align-items:center;gap:6px;}
.score-track{flex:1;height:4px;background:var(--surface3);border-radius:2px;overflow:hidden;}
.score-fill{height:100%;border-radius:2px;transition:width 0.4s ease;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(4,8,12,0.85);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity 0.2s;backdrop-filter:blur(4px);}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:760px;position:relative;margin:auto;box-shadow:0 24px 80px rgba(0,0,0,0.6);}
.modal-xl{max-width:1000px;}
.modal-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1;border-radius:16px 16px 0 0;}
.modal-title{font-size:1rem;font-weight:700;letter-spacing:-0.2px;}
.modal-body{padding:1.5rem;}
.modal-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;border-radius:0 0 16px 16px;}
.close-btn{width:30px;height:30px;border:1px solid var(--border);background:var(--surface2);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:14px;transition:all var(--transition);}
.close-btn:hover{background:var(--surface3);color:var(--text);}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.full{grid-column:1/-1;}
.form-section-label{grid-column:1/-1;font-size:0.7rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;padding-top:0.75rem;border-top:1px solid var(--border);margin-top:0.25rem;}
.form-section-label:first-child{border-top:none;padding-top:0;margin-top:0;}
label{font-size:0.75rem;font-weight:500;color:var(--text2);}
input,textarea{width:100%;padding:0 0.875rem;height:38px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r3);font-size:0.85rem;color:var(--text);font-family:var(--font);outline:none;transition:border-color var(--transition);}
input::placeholder,textarea::placeholder{color:var(--text3);}
input:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim);}
textarea{height:80px;padding:0.625rem 0.875rem;resize:vertical;}
input[type=number]{font-family:var(--mono);font-size:0.9rem;}
input[type=range]{height:auto;padding:0;border:none;background:none;box-shadow:none;accent-color:var(--gold);}
.form-select{width:100%;height:38px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r3);padding:0 0.875rem;font-size:0.85rem;color:var(--text);font-family:var(--font);outline:none;cursor:pointer;transition:border-color var(--transition);}
.form-select:focus{border-color:var(--gold);}
@media(max-width:560px){.form-grid{grid-template-columns:1fr;}}

/* RANKING VIEW */
.rank-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;display:flex;align-items:center;gap:1rem;transition:all var(--transition);cursor:pointer;}
.rank-card:hover{background:var(--surface2);border-color:var(--border2);}
.rank-card.pos-1{border-color:rgba(232,160,32,0.35);background:rgba(232,160,32,0.04);}
.rank-medal{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}

/* COMPARAR */
.compare-table{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.compare-row{display:grid;gap:0;}
.compare-cell{padding:0.6rem 0.875rem;font-size:0.82rem;border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
.compare-cell:last-child{border-right:none;}
.compare-head{background:var(--bg2);font-size:0.7rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;border-bottom:2px solid var(--border2);}
.compare-label{background:var(--bg3);font-weight:500;color:var(--text2);font-size:0.75rem;}
.compare-best{background:var(--green-dim);color:var(--green);font-weight:700;}
.compare-worst{color:var(--red);}

/* ASISTENTE */
.asistente-result{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-top:1.25rem;}
.asistente-item{display:flex;align-items:center;gap:1rem;padding:0.875rem;border-radius:var(--r2);background:var(--surface);border:1px solid var(--border);margin-bottom:0.625rem;transition:all var(--transition);}
.asistente-item:last-child{margin-bottom:0;}
.asistente-item.top{border-color:rgba(232,160,32,0.3);background:rgba(232,160,32,0.04);}

/* INCIDENCIAS */
.inc-row{display:flex;align-items:flex-start;gap:10px;padding:0.75rem 0;border-bottom:1px solid var(--border);}
.inc-row:last-child{border-bottom:none;}
.inc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}

/* FICHA PROVEEDOR */
.ficha-section{margin-bottom:1.5rem;}
.ficha-section-title{font-size:0.7rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:0.875rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border);}
.ficha-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:0.75rem;}
.ficha-field{background:var(--bg3);border-radius:var(--r3);padding:0.75rem;}
.ficha-field-label{font-size:0.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px;}
.ficha-field-val{font-size:0.88rem;font-weight:600;color:var(--text);}
.ficha-field-val.mono{font-family:var(--mono);font-size:0.82rem;}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:0.75rem 1.1rem;border-radius:var(--r2);font-size:0.82rem;font-weight:500;z-index:400;transform:translateY(60px);opacity:0;transition:all 0.25s cubic-bezier(0.4,0,0.2,1);pointer-events:none;max-width:320px;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{border-color:rgba(34,201,122,0.4);background:rgba(34,201,122,0.1);color:var(--green);}
.toast.err{border-color:rgba(240,80,80,0.4);background:rgba(240,80,80,0.1);color:var(--red);}

/* EMPTY */
.empty-state{text-align:center;padding:4rem 2rem;color:var(--text3);}
.empty-icon{font-size:2.5rem;margin-bottom:1rem;opacity:0.5;}
.empty-title{font-size:1rem;font-weight:600;color:var(--text2);margin-bottom:0.5rem;}
.empty-sub{font-size:0.85rem;}

/* RESPONSIVE */
@media(max-width:768px){
  .content{padding:1rem;}
  .prov-grid{grid-template-columns:1fr;}
  .kpi-strip{grid-template-columns:1fr 1fr;}
  .topbar{padding:0 1rem;}
}
@media(max-width:480px){
  .kpi-strip{grid-template-columns:1fr 1fr;}
  .nav{padding:0 1rem;}
  .nav-tab{padding:0 0.75rem;}
}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
.fade-up{animation:fadeUp 0.3s ease both;}
.prov-card{animation:fadeUp 0.25s ease both;}

/* VIEW TOGGLE */
.view-toggle{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);padding:2px;}
.vt-btn{width:30px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:4px;cursor:pointer;color:var(--text3);border:none;background:none;transition:all var(--transition);}
.vt-btn.active{background:var(--surface2);color:var(--text);}
.vt-btn svg{width:14px;height:14px;}
</style>
</head>
<body>
<!-- CONFIG SCREEN -->
<div id="config-screen" class="config-screen" style="display:none;">
  <div class="config-box fade-up">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:0.375rem;">
      <div class="brand-mark" style="width:44px;height:44px;border-radius:10px;font-size:18px;">M</div>
      <div>
        <div style="font-size:1.2rem;font-weight:800;letter-spacing:-0.5px;">Macor <span style="color:var(--gold);">Proveedores</span></div>
        <div style="font-size:0.78rem;color:var(--text3);">Suite de gestión profesional</div>
      </div>
    </div>
    <p style="font-size:0.82rem;color:var(--text2);margin:1.5rem 0;line-height:1.6;">Introduce los datos de tu proyecto Firebase para activar la sincronización en tiempo real entre todos tus dispositivos.</p>
    <div style="display:flex;flex-direction:column;gap:0.75rem;margin-bottom:1.5rem;">
      <div class="form-group"><label>API Key</label><input id="cfg-apiKey" placeholder="AIzaSy..."/></div>
      <div class="form-group"><label>Auth Domain</label><input id="cfg-authDomain" placeholder="tu-proyecto.firebaseapp.com"/></div>
      <div class="form-group"><label>Project ID</label><input id="cfg-projectId" placeholder="tu-proyecto"/></div>
      <div class="form-group"><label>App ID</label><input id="cfg-appId" placeholder="1:123456:web:abc..."/></div>
    </div>
    <button class="btn btn-gold" style="width:100%;justify-content:center;height:42px;font-size:0.9rem;" onclick="saveConfig()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      Guardar y conectar
    </button>
    <p style="text-align:center;margin-top:1rem;font-size:0.75rem;color:var(--text3);">
      <a href="#" onclick="useDemo()" style="color:var(--gold);text-decoration:none;">Explorar en modo demo →</a>
    </p>
  </div>
</div>

<!-- APP -->
<div id="app" class="app" style="display:none;">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">M</div>
      <span class="brand-name">Macor</span>
      <span class="brand-sep">·</span>
      <span class="brand-sub">Proveedores</span>
    </div>
    <div class="topbar-gap"></div>
    <div class="sync-badge">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-text">Conectando…</span>
    </div>
  </header>

  <nav class="nav" id="main-nav">
    <div class="nav-tab active" id="tab-proveedores" onclick="goTab('proveedores')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Proveedores
    </div>
    <div class="nav-tab" id="tab-ranking" onclick="goTab('ranking')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
      Ranking
    </div>
    <div class="nav-tab" id="tab-comparar" onclick="goTab('comparar')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2v-4M9 21H5a2 2 0 0 1-2-2v-4m0 0h18"/></svg>
      Comparar
    </div>
    <div class="nav-tab" id="tab-asistente" onclick="goTab('asistente')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Asistente
      <span class="nav-count" id="badge-asistente" style="display:none;">IA</span>
    </div>
    <div class="nav-tab" id="tab-estadisticas" onclick="goTab('estadisticas')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 4-4"/></svg>
      Estadísticas
    </div>
  </nav>

  <main class="content" id="main-content">
    <div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-title">Cargando…</div></div>
  </main>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay"><div class="modal" id="modal-box"></div></div>
<div class="toast" id="toast"></div>
<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let db=null, demoMode=false;
let proveedores=[];
let currentTab='proveedores';
let viewMode='grid'; // grid | table
let sortField='nombre', sortDir=1;
let compareIds=new Set();
let W=JSON.parse(localStorage.getItem('macor_prov_w')||'null')||{margen:30,entrega:25,fiabilidad:25,calidad:20};

// ═══════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════
function getSavedCfg(){try{return JSON.parse(localStorage.getItem('macor_fb')||'null');}catch{return null;}}
function saveConfig(){
  const cfg={apiKey:ge('cfg-apiKey').value.trim(),authDomain:ge('cfg-authDomain').value.trim(),projectId:ge('cfg-projectId').value.trim(),appId:ge('cfg-appId').value.trim()};
  if(!cfg.apiKey||!cfg.projectId){toast('Completa API Key y Project ID','err');return;}
  localStorage.setItem('macor_fb',JSON.stringify(cfg));initFirebase(cfg);
}
function useDemo(){
  demoMode=true;proveedores=demoData();
  boot('demo');
}
function initFirebase(cfg){
  try{
    if(!firebase.apps.length)firebase.initializeApp(cfg);
    db=firebase.firestore();
    db.collection('proveedores').onSnapshot(snap=>{
      proveedores=snap.docs.map(d=>({id:d.id,...d.data()}));
      render();setSync('ok');
    },()=>setSync('err'));
    boot('ok');
  }catch(e){toast('Error Firebase: '+e.message,'err');}
}
function boot(s){
  ge('config-screen').style.display='none';
  ge('app').style.display='flex';
  setSync(s);
  goTab('proveedores');
}
function setSync(s){
  const dot=ge('sync-dot'),txt=ge('sync-text');
  dot.className='sync-dot '+s;
  txt.textContent=s==='ok'?'Sincronizado':s==='demo'?'Demo':s==='err'?'Error':' Conectando…';
}
window.addEventListener('DOMContentLoaded',()=>{
  const cfg=getSavedCfg();
  if(cfg?.apiKey){ge('app').style.display='flex';initFirebase(cfg);}
  else ge('config-screen').style.display='flex';
});

// ═══════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════
function goTab(tab){
  currentTab=tab;
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.toggle('active',el.id==='tab-'+tab));
  render();
}
function render(){
  const fns={proveedores:renderProveedores,ranking:renderRanking,comparar:renderComparar,asistente:renderAsistente,estadisticas:renderEstadisticas};
  (fns[currentTab]||renderProveedores)();
}

// ═══════════════════════════════════════════════
// SCORE ENGINE
// ═══════════════════════════════════════════════
function calcScore(p,w){
  w=w||W; let s=0,t=0;
  const add=(v,max,weight,inv)=>{if(v==null||v==='')return;const n=Math.min(100,Math.max(0,inv?(Math.max(0,max-v)/max)*100:(v/max)*100));s+=n*weight;t+=weight;};
  add(p.margen,60,w.margen,false);
  add(p.entrega,30,w.entrega,true);
  add(p.fiabilidad,10,w.fiabilidad,false);
  add(p.calidad,10,w.calidad,false);
  return t?Math.round(s/t):0;
}
function scoreColor(s){return s>=70?'var(--green)':s>=45?'var(--amber)':'var(--red)';}
function scoreRing(s){
  const r=18,circ=2*Math.PI*r,offset=circ-(s/100)*circ;
  const col=s>=70?'#22c97a':s>=45?'#f0a030':'#f05050';
  return `<svg viewBox="0 0 46 46" width="46" height="46" style="transform:rotate(-90deg);">
    <circle class="track" cx="23" cy="23" r="${r}" fill="none" stroke="var(--surface3)" stroke-width="4"/>
    <circle cx="23" cy="23" r="${r}" fill="none" stroke="${col}" stroke-width="4" stroke-linecap="round"
      stroke-dasharray="${circ}" stroke-dashoffset="${offset}" style="transition:stroke-dashoffset 0.6s ease;"/>
  </svg>
  <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:800;font-family:var(--mono);color:${col};">${s}</div>`;
}

// ═══════════════════════════════════════════════
// PROVEEDORES VIEW
// ═══════════════════════════════════════════════
function renderProveedores(){
  const q=(ge('q-main')||{value:''}).value.toLowerCase();
  const cat=(ge('filter-cat')||{value:''}).value;
  const estado=(ge('filter-estado')||{value:''}).value;
  let list=proveedores.map(p=>({...p,_score:calcScore(p)}));
  if(q)list=list.filter(p=>`${p.nombre}${p.categoria}${p.zona}${p.contacto}${p.notas||''}`.toLowerCase().includes(q));
  if(cat)list=list.filter(p=>p.categoria===cat);
  if(estado)list=list.filter(p=>(p.estado||'activo')===estado);

  const sortFns={
    nombre:(a,b)=>a.nombre.localeCompare(b.nombre)*sortDir,
    margen:(a,b)=>((a.margen||0)-(b.margen||0))*sortDir,
    entrega:(a,b)=>((a.entrega||999)-(b.entrega||999))*sortDir,
    fiabilidad:(a,b)=>((a.fiabilidad||0)-(b.fiabilidad||0))*sortDir,
    score:(a,b)=>(a._score-b._score)*sortDir,
    categoria:(a,b)=>(a.categoria||'').localeCompare(b.categoria||'')*sortDir,
  };
  list.sort(sortFns[sortField]||sortFns.nombre);

  const cats=[...new Set(proveedores.map(p=>p.categoria).filter(Boolean))].sort();
  const total=proveedores.length, activos=proveedores.filter(p=>(p.estado||'activo')==='activo').length;
  const avgMargen=proveedores.filter(p=>p.margen!=null).reduce((s,p,_,a)=>s+p.margen/a.length,0)||0;
  const avgEntrega=proveedores.filter(p=>p.entrega!=null).reduce((s,p,_,a)=>s+p.entrega/a.length,0)||0;

  ge('main-content').innerHTML=`
  <div class="kpi-strip">
    <div class="kpi"><div class="kpi-label">Total proveedores</div><div class="kpi-val">${total}</div><div class="kpi-sub">${activos} activos</div></div>
    <div class="kpi"><div class="kpi-label">Margen medio</div><div class="kpi-val gold">${avgMargen.toFixed(1)}<span style="font-size:1rem;font-weight:600;">%</span></div></div>
    <div class="kpi"><div class="kpi-label">Entrega media</div><div class="kpi-val">${avgEntrega.toFixed(1)}<span style="font-size:1rem;font-weight:600;">d</span></div></div>
    <div class="kpi"><div class="kpi-label">Categorías</div><div class="kpi-val">${cats.length}</div></div>
  </div>

  <div style="display:flex;gap:0.75rem;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center;">
    <div class="search-bar" style="flex:1;min-width:200px;">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="q-main" placeholder="Buscar por nombre, categoría, zona, notas…" value="${(ge('q-main')||{value:''}).value}" oninput="renderProveedores()"/>
    </div>
    <select id="filter-cat" onchange="renderProveedores()" style="height:40px;min-width:160px;">
      <option value="">Todas las categorías</option>
      ${cats.map(c=>`<option value="${esc(c)}" ${cat===c?'selected':''}>${esc(c)}</option>`).join('')}
    </select>
    <select id="filter-estado" onchange="renderProveedores()" style="height:40px;">
      <option value="">Todos los estados</option>
      <option value="activo" ${estado==='activo'?'selected':''}>Activos</option>
      <option value="pausado" ${estado==='pausado'?'selected':''}>Pausados</option>
      <option value="inactivo" ${estado==='inactivo'?'selected':''}>Inactivos</option>
    </select>
    <div class="view-toggle">
      <button class="vt-btn ${viewMode==='grid'?'active':''}" onclick="viewMode='grid';renderProveedores()" title="Vista tarjetas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      </button>
      <button class="vt-btn ${viewMode==='table'?'active':''}" onclick="viewMode='table';renderProveedores()" title="Vista tabla">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </button>
    </div>
    <button class="btn btn-gold" onclick="openForm(null)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      Nuevo proveedor
    </button>
  </div>

  ${list.length===0?`<div class="empty-state"><div class="empty-icon">🏭</div><div class="empty-title">No hay proveedores${q?' con ese criterio':''}</div><div class="empty-sub">${q?'Prueba a cambiar la búsqueda.':'Añade el primer proveedor con el botón de arriba.'}</div></div>`:
    viewMode==='grid'?renderGrid(list):renderTable(list)}`;
}

function renderGrid(list){
  return `<div class="prov-grid">${list.map((p,i)=>{
    const sc=p._score;
    const col=scoreColor(sc);
    const estadoBadge=p.estado==='pausado'?'<span class="badge badge-amber" style="font-size:0.65rem;">Pausado</span>':p.estado==='inactivo'?'<span class="badge badge-red" style="font-size:0.65rem;">Inactivo</span>':'';
    return `<div class="prov-card ${i===0&&!list[i].estado==='inactivo'?'rank-1':''}" style="animation-delay:${i*0.03}s" onclick="openFicha('${p.id}')">
      <div class="prov-head">
        <div style="flex:1;min-width:0;padding-right:0.75rem;">
          <div class="prov-name">${esc(p.nombre)}</div>
          <div class="prov-cat">${p.categoria?esc(p.categoria):'Sin categoría'}${p.zona?' · '+esc(p.zona):''}</div>
          <div style="margin-top:6px;">${estadoBadge}</div>
        </div>
        <div class="prov-score-ring" style="position:relative;">${scoreRing(sc)}</div>
      </div>
      <div class="prov-pills">
        ${p.pago?`<span class="pill pill-blue">💳 ${esc(p.pago)}</span>`:''}
        ${p.entrega!=null?`<span class="pill ${p.entrega<=2?'pill-green':p.entrega<=5?'pill-amber':'pill-red'}">⏱ ${p.entrega}d</span>`:''}
        ${p.margen!=null?`<span class="pill ${p.margen>=30?'pill-green':p.margen>=20?'pill-amber':'pill-red'}">📈 ${p.margen}%</span>`:''}
        ${p.rappel?`<span class="pill pill-gold">🔄 Rappel ${p.rappel}%</span>`:''}
      </div>
      <div class="prov-metrics">
        <div class="metric">
          <div class="metric-label">Margen</div>
          <div class="metric-val ${p.margen>=30?'good':p.margen>=20?'warn':'bad'}">${p.margen!=null?p.margen+'%':'—'}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Entrega</div>
          <div class="metric-val ${p.entrega<=2?'good':p.entrega<=5?'warn':'bad'}">${p.entrega!=null?p.entrega+'d':'—'}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Fiabilidad</div>
          <div class="metric-val ${(p.fiabilidad||0)>=8?'good':(p.fiabilidad||0)>=6?'warn':'bad'}">${p.fiabilidad!=null?p.fiabilidad+'/10':'—'}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Calidad</div>
          <div class="metric-val ${(p.calidad||0)>=8?'good':(p.calidad||0)>=6?'warn':'bad'}">${p.calidad!=null?p.calidad+'/10':'—'}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Ped. mín.</div>
          <div class="metric-val">${p.pedidoMin!=null?p.pedidoMin+'€':'—'}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Descuento</div>
          <div class="metric-val">${p.descuento!=null?p.descuento+'%':'—'}</div>
        </div>
      </div>
      <div class="prov-footer">
        <div class="prov-contact">${p.contacto?'👤 '+esc(p.contacto):'Sin contacto'}</div>
        <div style="display:flex;gap:5px;" onclick="event.stopPropagation()">
          <button class="btn btn-ghost btn-xs" onclick="addToCompare('${p.id}')">
            ${compareIds.has(p.id)?'✓ En comparar':'+ Comparar'}
          </button>
          <button class="btn btn-surface btn-xs" onclick="openForm('${p.id}')">Editar</button>
        </div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function renderTable(list){
  const th=(field,label)=>`<th onclick="setSort('${field}')" class="${sortField===field?'sorted':''}">${label}${sortField===field?`<span class="sort-arrow">${sortDir>0?'↑':'↓'}</span>`:'<span class="sort-arrow" style="opacity:0.2;">↕</span>'}</th>`;
  return `<div class="card"><div class="table-wrap"><table>
    <thead><tr>
      ${th('nombre','Proveedor')}${th('categoria','Categoría')}
      ${th('margen','Margen')}${th('entrega','Entrega')}
      <th>Fiabilidad</th><th>Calidad</th><th>Pago</th><th>Ped. mín.</th>
      ${th('score','Score')}<th></th>
    </tr></thead>
    <tbody>
    ${list.map(p=>`<tr onclick="openFicha('${p.id}')">
      <td>
        <div style="font-weight:600;">${esc(p.nombre)}</div>
        ${p.contacto?`<div style="font-size:0.72rem;color:var(--text3);">${esc(p.contacto)}</div>`:''}
      </td>
      <td>${p.categoria?`<span class="badge badge-blue">${esc(p.categoria)}</span>`:'-'}</td>
      <td><span style="font-weight:700;color:${p.margen>=30?'var(--green)':p.margen>=20?'var(--amber)':'var(--red)'};">${p.margen!=null?p.margen+'%':'—'}</span></td>
      <td><span style="font-weight:600;color:${p.entrega<=2?'var(--green)':p.entrega<=5?'var(--amber)':'var(--red)'};">${p.entrega!=null?p.entrega+'d':'—'}</span></td>
      <td>${p.fiabilidad!=null?`<div class="score-bar"><div class="score-track"><div class="score-fill" style="width:${p.fiabilidad*10}%;background:${scoreColor(p.fiabilidad*10)};"></div></div><span style="font-size:0.75rem;font-family:var(--mono);min-width:24px;">${p.fiabilidad}</span></div>`:'-'}</td>
      <td>${p.calidad!=null?`<div class="score-bar"><div class="score-track"><div class="score-fill" style="width:${p.calidad*10}%;background:${scoreColor(p.calidad*10)};"></div></div><span style="font-size:0.75rem;font-family:var(--mono);min-width:24px;">${p.calidad}</span></div>`:'-'}</td>
      <td style="font-size:0.78rem;">${p.pago||'—'}</td>
      <td style="font-size:0.78rem;font-family:var(--mono);">${p.pedidoMin!=null?p.pedidoMin+'€':'—'}</td>
      <td><span style="font-size:1.1rem;font-weight:800;font-family:var(--mono);color:${scoreColor(p._score)};">${p._score}</span></td>
      <td onclick="event.stopPropagation()"><div style="display:flex;gap:4px;">
        <button class="btn btn-ghost btn-xs" onclick="openForm('${p.id}')">Editar</button>
        <button class="btn btn-danger btn-xs" onclick="delProv('${p.id}')">✕</button>
      </div></td>
    </tr>`).join('')}
    </tbody></table></div></div>`;
}

function setSort(f){if(sortField===f)sortDir*=-1;else{sortField=f;sortDir=-1;}renderProveedores();}

// ═══════════════════════════════════════════════
// FICHA PROVEEDOR
// ═══════════════════════════════════════════════
function openFicha(id){
  const p=proveedores.find(x=>x.id===id);if(!p)return;
  const sc=calcScore(p);
  const col=scoreColor(sc);

  const field=(label,val,mono)=>`<div class="ficha-field">
    <div class="ficha-field-label">${label}</div>
    <div class="ficha-field-val${mono?' mono':''}">${val||'—'}</div>
  </div>`;

  showModal(`
  <div class="modal-header">
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:42px;height:42px;border-radius:10px;background:${col};display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:800;color:#080c10;font-family:var(--mono);flex-shrink:0;">${sc}</div>
      <div>
        <div class="modal-title">${esc(p.nombre)}</div>
        <div style="font-size:0.78rem;color:var(--text3);">${p.categoria||'Sin categoría'}${p.zona?' · '+esc(p.zona):''}</div>
      </div>
    </div>
    <button class="close-btn" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-body">
    <div class="ficha-section">
      <div class="ficha-section-title">Contacto</div>
      <div class="ficha-grid">
        ${field('Persona de contacto',esc(p.contacto))}
        ${field('Teléfono',p.telefono?`<a href="tel:${p.telefono}" style="color:var(--gold);text-decoration:none;">${esc(p.telefono)}</a>`:null)}
        ${field('Email',p.email?`<a href="mailto:${p.email}" style="color:var(--gold);text-decoration:none;font-size:0.8rem;">${esc(p.email)}</a>`:null)}
        ${field('Web',p.web?`<a href="https://${p.web.replace(/^https?:\/\//,'')}" target="_blank" style="color:var(--gold);text-decoration:none;font-size:0.8rem;">${esc(p.web)}</a>`:null)}
      </div>
    </div>
    <div class="ficha-section">

function openIncidencia(id){
  showModal(`
  <div class="modal-header"><div class="modal-title">Registrar incidencia</div><button class="close-btn" onclick="closeModal()">✕</button></div>
  <div class="modal-body">

    <div class="form-group" style="margin-bottom:0.875rem;"><label>Gravedad</label>
      <select class="form-select" id="inc-tipo">
        <option value="leve">Leve — Pequeño problema</option>
        <option value="media">Media — Afecta al servicio</option>
        <option value="grave">Grave — Fallo importante</option>
      </select>
    </div>
    <div class="form-group"><label>Fecha</label><input id="inc-fecha" type="date" value="${new Date().toISOString().split('T')[0]}"/></div>
  </div>
  <div class="modal-footer">

    <button class="btn btn-gold" onclick="saveIncidencia('${id}')">Guardar incidencia</button>
  </div>`);
}

async function saveIncidencia(id){
  const texto=ge('inc-texto').value.trim();if(!texto){toast('Escribe la descripción','err');return;}
  const p=proveedores.find(x=>x.id===id);if(!p)return;
  const inc={texto,tipo:gv('inc-tipo'),fecha:gv('inc-fecha')};
  const incs=[...(p.incidencias||[]),inc];
  // Penalizar fiabilidad automáticamente
  let newFiab=p.fiabilidad;
  if(newFiab!=null){const pen={leve:0.5,media:1,grave:2};newFiab=Math.max(1,parseFloat((newFiab-(pen[inc.tipo]||1)).toFixed(1)));}
  await saveDoc('proveedores',id,{incidencias:incs,fiabilidad:newFiab,updatedAt:new Date().toISOString()});
  closeModal();toast('Incidencia registrada — fiabilidad actualizada','ok');
}

function toggleCompare(id){

  renderComparar();
}

function renderCompareTable(sel){
  const cols=sel.length+1;
  const colW=Math.floor(100/(cols))+'%';
  const rows=[
    {label:'Score global',key:'_score',fmt:v=>`<span style="font-weight:800;font-family:var(--mono);color:${scoreColor(v)};">${v}/100</span>`,better:'max'},
    {label:'Margen (%)',key:'margen',fmt:v=>v!=null?`<span style="color:${v>=30?'var(--green)':v>=20?'var(--amber)':'var(--red)'};">${v}%</span>`:'—',better:'max'},
    {label:'Descuento (%)',key:'descuento',fmt:v=>v!=null?v+'%':'—',better:'max'},
    {label:'Rappel anual (%)',key:'rappel',fmt:v=>v!=null?v+'%':'—',better:'max'},
    {label:'Entrega (días)',key:'entrega',fmt:v=>v!=null?`<span style="color:${v<=2?'var(--green)':v<=5?'var(--amber)':'var(--red)'};">${v}d</span>`:'—',better:'min'},
    {label:'Pedido mínimo (€)',key:'pedidoMin',fmt:v=>v!=null?v+'€':'—',better:'min'},
    {label:'Portes gratis (€)',key:'portesGratis',fmt:v=>v!=null?v+'€':'—',better:'min'},
    {label:'Coste portes (€)',key:'portesCoste',fmt:v=>v!=null?v+'€':'—',better:'min'},
    {label:'Forma de pago',key:'pago',fmt:v=>v||'—',better:null},
    {label:'Fiabilidad',key:'fiabilidad',fmt:v=>v!=null?v+'/10':'—',better:'max'},
    {label:'Calidad',key:'calidad',fmt:v=>v!=null?v+'/10':'—',better:'max'},
    {label:'Atención',key:'atencion',fmt:v=>v!=null?v+'/10':'—',better:'max'},
    {label:'Zona',key:'zona',fmt:v=>v||'—',better:null},
    {label:'Estado',key:'estado',fmt:v=>v==='pausado'?'<span class="badge badge-amber">Pausado</span>':v==='inactivo'?'<span class="badge badge-red">Inactivo</span>':'<span class="badge badge-green">Activo</span>',better:null},
  ];

  const style=`display:grid;grid-template-columns:180px ${sel.map(()=>'1fr').join(' ')};`;

  const header=`<div class="compare-row compare-head" style="${style}">
    <div class="compare-cell">Característica</div>
    ${sel.map(p=>`<div class="compare-cell" style="font-size:0.78rem;color:var(--text);">${esc(p.nombre)}</div>`).join('')}
  </div>`;

  const dataRows=rows.map(row=>{
    const vals=sel.map(p=>p[row.key]);
    const numVals=vals.filter(v=>v!=null&&!isNaN(v));
    let bestVal=null;
    if(row.better==='max'&&numVals.length)bestVal=Math.max(...numVals);
    if(row.better==='min'&&numVals.length)bestVal=Math.min(...numVals);
    return `<div class="compare-row" style="${style}">
      <div class="compare-cell compare-label">${row.label}</div>
      ${sel.map(p=>{
        const v=p[row.key];const isBest=bestVal!=null&&parseFloat(v)===bestVal;
        return `<div class="compare-cell ${isBest?'compare-best':''}">${row.fmt(v)}${isBest?' <span style="font-size:0.65rem;">✓</span>':''}</div>`;
      }).join('')}
    </div>`;
  }).join('');

  return `<div class="compare-table">${header}${dataRows}</div>`;
}

function runAsistente(){
  const cat=gv('asi-cat');
  const maxEnt=parseInt(ge('asi-ent').value)||999;
  const maxPedido=parseInt(ge('asi-pedido').value)||999999;
  const prioridad=gv('asi-prioridad');

  let list=proveedores.filter(p=>(p.estado||'activo')==='activo');
  if(cat)list=list.filter(p=>p.categoria===cat);
  if(maxEnt<999)list=list.filter(p=>p.entrega==null||p.entrega<=maxEnt);
  if(maxPedido<999999)list=list.filter(p=>p.pedidoMin==null||p.pedidoMin<=maxPedido);

  const sortMap={
    score:(a,b)=>calcScore(b)-calcScore(a),
    margen:(a,b)=>(b.margen||0)-(a.margen||0),
    entrega:(a,b)=>(a.entrega||999)-(b.entrega||999),
    fiabilidad:(a,b)=>(b.fiabilidad||0)-(a.fiabilidad||0),
    calidad:(a,b)=>(b.calidad||0)-(a.calidad||0),
  };
  list.sort(sortMap[prioridad]||sortMap.score);

  const el=ge('asi-result');
  if(!list.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">😕</div><div class="empty-title">Ningún proveedor cumple todos los filtros</div><div class="empty-sub">Prueba a ampliar los criterios.</div></div>`;
    return;
  }

  const prioLabels={score:'Mejor valorado',margen:'Mayor margen',entrega:'Entrega más rápida',fiabilidad:'Más fiable',calidad:'Mejor calidad'};
  el.innerHTML=`
  <div style="font-size:0.72rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:0.875rem;">
    ${list.length} proveedor${list.length!==1?'es':''} encontrado${list.length!==1?'s':''} · Ordenados por: ${prioLabels[prioridad]||'Score'}
  </div>
  <div class="asistente-result">
    ${list.map((p,i)=>{
      const sc=calcScore(p);const col=scoreColor(sc);
      return `<div class="asistente-item ${i===0?'top':''}" onclick="openFicha('${p.id}')" style="cursor:pointer;">
        <div style="font-size:1.5rem;">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'  '}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:700;font-size:0.92rem;">${esc(p.nombre)}${i===0?` <span style="font-size:0.72rem;color:var(--gold);font-weight:600;">[RECOMENDADO]</span>`:''}</div>
          <div style="font-size:0.75rem;color:var(--text3);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap;">
            ${p.margen!=null?`📈 ${p.margen}% margen`:''}
            ${p.entrega!=null?`⏱ ${p.entrega}d entrega`:''}
            ${p.fiabilidad!=null?`⭐ ${p.fiabilidad}/10 fiabilidad`:''}
            ${p.pago?`💳 ${p.pago}`:''}
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-size:1.5rem;font-weight:900;font-family:var(--mono);color:${col};">${sc}</div>
          <div style="font-size:0.65rem;color:var(--text3);">score</div>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// ═══════════════════════════════════════════════
// ESTADÍSTICAS VIEW
// ═══════════════════════════════════════════════
function renderEstadisticas(){
  const activos=proveedores.filter(p=>(p.estado||'activo')==='activo');
  const scored=activos.map(p=>({...p,_score:calcScore(p)})).sort((a,b)=>b._score-a._score);
  const cats=[...new Set(proveedores.map(p=>p.categoria).filter(Boolean))].sort();
  const avgScore=scored.length?Math.round(scored.reduce((s,p)=>s+p._score,0)/scored.length):0;
  const avgMargen=activos.filter(p=>p.margen!=null).reduce((s,p,_,a)=>s+p.margen/a.filter(x=>x.margen!=null).length,0)||0;
  const avgEntrega=activos.filter(p=>p.entrega!=null).reduce((s,p,_,a)=>s+p.entrega/a.filter(x=>x.entrega!=null).length,0)||0;
  const avgFiab=activos.filter(p=>p.fiabilidad!=null).reduce((s,p,_,a)=>s+p.fiabilidad/a.filter(x=>x.fiabilidad!=null).length,0)||0;
  const incTot=proveedores.reduce((s,p)=>s+(p.incidencias||[]).length,0);

  ge('main-content').innerHTML=`
  <div class="kpi-strip" style="grid-template-columns:repeat(5,1fr);">
    <div class="kpi"><div class="kpi-label">Proveedores totales</div><div class="kpi-val">${proveedores.length}</div><div class="kpi-sub">${activos.length} activos</div></div>
    <div class="kpi"><div class="kpi-label">Score medio</div><div class="kpi-val" style="color:${scoreColor(avgScore)};">${avgScore}</div><div class="kpi-sub">sobre 100</div></div>
    <div class="kpi"><div class="kpi-label">Margen medio</div><div class="kpi-val gold">${avgMargen.toFixed(1)}%</div></div>
    <div class="kpi"><div class="kpi-label">Entrega media</div><div class="kpi-val">${avgEntrega.toFixed(1)}d</div></div>
    <div class="kpi"><div class="kpi-label">Fiabilidad media</div><div class="kpi-val">${avgFiab.toFixed(1)}/10</div><div class="kpi-sub">${incTot} incidencias total</div></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">
    <div class="card card-pad">
      <div style="font-size:0.72rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:1rem;">Top 5 proveedores</div>
      ${scored.slice(0,5).map((p,i)=>`
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <span style="font-size:0.72rem;font-family:var(--mono);color:var(--text3);width:18px;">${i+1}</span>
        <span style="flex:1;font-size:0.85rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.nombre)}</span>
        <div class="score-track" style="width:80px;height:5px;"><div class="score-fill" style="width:${p._score}%;background:${scoreColor(p._score)};"></div></div>
        <span style="font-size:0.8rem;font-weight:700;font-family:var(--mono);min-width:36px;text-align:right;color:${scoreColor(p._score)};">${p._score}</span>
      </div>`).join('')}
    </div>

    <div class="card card-pad">
      <div style="font-size:0.72rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:1rem;">Por categoría</div>
      ${cats.map(cat=>{
        const n=proveedores.filter(p=>p.categoria===cat).length;
        const pct=Math.round(n/proveedores.length*100);
        const best=scored.filter(p=>p.categoria===cat).sort((a,b)=>b._score-a._score)[0];
        return `<div style="margin-bottom:10px;">
          <div style="display:flex;justify-content:space-between;font-size:0.8rem;margin-bottom:4px;">
            <span style="font-weight:500;">${esc(cat)}</span>
            <span style="color:var(--text3);">${n} proveedor${n!==1?'es':''}</span>
          </div>
          <div class="score-track" style="height:6px;"><div class="score-fill" style="width:${pct}%;background:var(--blue);"></div></div>
          ${best?`<div style="font-size:0.7rem;color:var(--text3);margin-top:2px;">Mejor: ${esc(best.nombre)} (${best._score} pts)</div>`:''}
        </div>`;
      }).join('')}
    </div>
  </div>

  <div class="card card-pad">
    <div style="font-size:0.72rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:1rem;">Estado de todos los proveedores</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0.75rem;">
      ${proveedores.map(p=>{
        const sc=calcScore(p);
        return `<div style="background:var(--bg3);border-radius:var(--r3);padding:0.75rem;display:flex;align-items:center;gap:10px;cursor:pointer;" onclick="openFicha('${p.id}')">
          <div style="font-size:1rem;font-weight:800;font-family:var(--mono);color:${scoreColor(sc)};min-width:32px;">${sc}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:0.82rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.nombre)}</div>
            <div style="font-size:0.7rem;color:var(--text3);">${p.categoria||'Sin cat.'}</div>
          </div>
          <span class="badge ${(p.estado||'activo')==='activo'?'badge-green':(p.estado)==='pausado'?'badge-amber':'badge-red'}" style="font-size:0.62rem;">${p.estado||'activo'}</span>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════
// DATA LAYER
// ═══════════════════════════════════════════════
async function saveDoc(col,id,data){
  if(demoMode){
    if(id){const i=proveedores.findIndex(x=>x.id===id);if(i>=0)proveedores[i]={...proveedores[i],...data};}
    else proveedores.push({id:'d_'+Date.now(),...data,createdAt:new Date().toISOString()});
    render();return;
  }
  if(id)await db.collection(col).doc(id).update(data);
  else await db.collection(col).add({...data,createdAt:new Date().toISOString()});
}
async function delDoc(col,id){
  if(demoMode){proveedores=proveedores.filter(x=>x.id!==id);render();return;}
  await db.collection(col).doc(id).delete();
}

// ═══════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════
function showModal(html,xl=false){
  const box=ge('modal-box');box.className='modal'+(xl?' modal-xl':'');box.innerHTML=html;
  ge('overlay').classList.add('open');
}
function closeModal(){ge('overlay').classList.remove('open');}
ge('overlay').addEventListener('click',e=>{if(e.target===ge('overlay'))closeModal();});

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function toast(msg,type=''){
  const t=ge('toast');t.textContent=msg;t.className='toast'+(type?' '+type:'');
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);
}
function ge(id){return document.getElementById(id);}
function gv(id){const el=ge(id);return el?el.value.trim():'';}
function num(id){const v=parseFloat(ge(id)?.value);return isNaN(v)?null:v;}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
